{% extends "base.html" %}
{% block title %}Edit · {{ item.name }}{% endblock %}
{% block content %}
<section class="card">
  <p><a href="/closet/{{ item.id }}">← Back</a></p>
  <h1>Edit clothing</h1>
  {% if error %}<p class="flash">{{ error }}</p>{% endif %}
  <form method="post" action="/closet/{{ item.id }}/edit" enctype="multipart/form-data" class="closet-form">
    <div>
      <label for="type">Type</label>
      <select id="type" name="type" required>
        {% for t in clothing_types %}
          <option value="{{ t }}" {% if item.type == t %}selected{% endif %}>{{ t }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Current photo</label>
      {% if item.photo_path %}
        <div class="garment-photo" style="max-width:160px;aspect-ratio:1;margin:.4rem 0">
          <img src="/uploads/{{ item.photo_path }}" alt="{{ item.name }}" />
        </div>
        <label style="font-weight:500"><input type="checkbox" name="remove_photo" value="1" /> Remove photo</label>
      {% else %}
        <p class="muted">No photo yet.</p>
      {% endif %}
    </div>
    <div>
      <label for="photo">New photo (optional)</label>
      <input id="photo" type="file" name="photo" accept="image/*" />
    </div>
    <div>
      <label for="name">Name / details</label>
      <input id="name" type="text" name="name" value="{{ item.name }}" required />
    </div>
    <button class="btn primary" type="submit">Save changes</button>
  </form>
</section>
{% endblock %}
